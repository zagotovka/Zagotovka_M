name: "CodeQL Analysis"

on:
  push:
    branches: [ "main", "Test" ]
  pull_request:
    branches: [ "main" ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install ARM GCC toolchain
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y gcc-arm-none-eabi

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: c-cpp
        build-mode: manual
        queries: security-and-quality

    - name: Build Code
      run: |
        # Собираем список всех папок с заголовочными файлами (.h) проекта
        INCLUDES=$(find . -name "*.h" -not -path "*/node_modules/*" -exec dirname {} \; | sort -u | sed 's/^/-I/')
        
        # Компилируем файлы, позволяя CodeQL перехватить процесс сборки
        find . -name "*.c" -not -path "*/node_modules/*" | while read f; do
          echo "Analyzing: $f"
          arm-none-eabi-gcc -c "$f" \
            -mcpu=cortex-m7 \
            -mfpu=fpv5-d16 \
            -mfloat-abi=hard \
            -DUSE_HAL_DRIVER \
            -DSTM32F767xx \
            $INCLUDES \
            -o /dev/null
        done

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:c-cpp"
